# Conda reconstruction of the cluster `gpu_env2` environment used for the paper.
#   conda env create -f environment.yml
#   conda activate cardiac-map-diffusion
#
# For an EXACT lock from the machine that produced the results, run on the
# cluster:  conda env export --no-builds > environment.lock.yml
name: cardiac-map-diffusion
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.12
  - pytorch=2.5.1
  - torchvision=0.20.1
  - torchaudio=2.5.1
  - pytorch-cuda=12.1
  - numpy=1.26.4
  - pandas=2.2.2
  - scipy=1.14.1
  - scikit-learn=1.5.1
  - scikit-image>=0.21
  - matplotlib=3.9.2
  - openpyxl=3.1.5
  - pywavelets>=1.4
  - dtaidistance>=2.3
  - tensorboard>=2.12
  - tqdm>=4.64
  - pyyaml>=6.0
  - jupyterlab>=4.0
  - ipykernel>=6.0
  - pytest>=7.0
  - pip
  - pip:
      - ml-collections>=0.1.1
      - absl-py>=2.1.0
      - -e .
